<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Alcancía Digital</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
</head>

<body>

    <!-- ========================= -->
    <!-- LOGIN -->
    <!-- ========================= -->

    <section id="authScreen" class="screen">

        <div class="card login-card">

            <h1>❤️ Alcancía Digital</h1>

            <p id="authMessage"></p>

            <input
                type="password"
                id="pin"
                maxlength="4"
                placeholder="PIN">

            <input
                type="password"
                id="confirmPin"
                maxlength="4"
                placeholder="Confirmar PIN">

            <button id="btnAuth">
                Continuar
            </button>

        </div>

    </section>

    <!-- ========================= -->
    <!-- CONFIGURACIÓN DEL MES -->
    <!-- ========================= -->

    <section id="setupScreen" class="screen hidden">

        <div class="card">

            <h2>⚙️ Configuración del Mes</h2>

            <h3 id="setupMonth"></h3>

            <input
                type="number"
                id="dailyAmount"
                min="1"
                placeholder="Ahorro diario (Bs)">

            <div class="preview-box">

                <p>Meta calculada ❤️</p>

                <h2 id="monthlyGoal">
                    0 Bs
                </h2>

            </div>

            <button id="saveMonthBtn">
                Comenzar Mes
            </button>

        </div>

    </section>

    <!-- ========================= -->
    <!-- APP -->
    <!-- ========================= -->

    <section id="appScreen" class="hidden">

        <!-- HEADER -->

        <header class="app-header">

            <h2 id="currentMonth">
                Junio 2026
            </h2>

            <p>
                ❤️ Ahorrar es ganar
            </p>

        </header>

        <!-- DASHBOARD -->

        <section id="dashboardView" class="view">

            <div class="card">

                <div class="stats-grid">

                    <div class="stat-box">

                        <span>Meta</span>

                        <h3 id="goalValue">
                            0 Bs
                        </h3>

                    </div>

                    <div class="stat-box">

                        <span>Ahorrado</span>

                        <h3 id="savedValue">
                            0 Bs
                        </h3>

                    </div>

                </div>

                <div class="stat-box full">

                    <span>Ahorro diario</span>

                    <h3 id="dailyValue">
                        0 Bs
                    </h3>

                </div>

                <div class="progress-container">

                    <div class="progress-bar">

                        <div id="progressFill"></div>

                    </div>

                </div>

                <p id="progressText">
                    0%
                </p>

                <div class="days-card">

                    <h3>Días cubiertos</h3>

                    <p id="coveredDays">
                        0 / 30
                    </p>

                </div>

            </div>

        </section>

        <!-- PERSONAS -->

        <section id="peopleView" class="view hidden">

            <div class="card">

                <h2>👥 Personas</h2>

                <div class="input-group">

                    <input
                        type="text"
                        id="personName"
                        placeholder="Nombre">

                    <button id="addPersonBtn">
                        Agregar
                    </button>

                </div>

                <ul id="peopleList">

                </ul>

            </div>

        </section>

        <!-- APORTES -->

        <section id="contributionsView" class="view hidden">

            <div class="card">

                <h2>💰 Registrar aporte</h2>

                <select id="personSelect">

                </select>

                <input
                    type="number"
                    id="amountInput"
                    min="1"
                    placeholder="Monto (Bs)">

                <textarea
                    id="commentInput"
                    placeholder="Comentario"></textarea>

                <button id="saveContributionBtn">
                    Guardar aporte
                </button>

            </div>

            <div class="card">

                <h2>📋 Movimientos</h2>

                <div id="contributionsList">

                </div>

            </div>

        </section>

        <!-- HISTORIAL -->

        <section id="historyView" class="view hidden">

            <div class="card">

                <h2>📅 Historial mensual</h2>

                <div id="monthsHistory">

                </div>

            </div>

        </section>

        <!-- NAVEGACIÓN -->

        <nav class="bottom-nav">

            <button class="nav-btn active"
                data-view="dashboardView">

                🏠
                <span>Inicio</span>

            </button>

            <button class="nav-btn"
                data-view="peopleView">

                👥
                <span>Personas</span>

            </button>

            <button class="nav-btn"
                data-view="contributionsView">

                💰
                <span>Aportes</span>

            </button>

            <button class="nav-btn"
                data-view="historyView">

                📅
                <span>Historial</span>

            </button>

        </nav>

    </section>

    <!-- ========================= -->
    <!-- MODAL EDITAR -->
    <!-- ========================= -->

    <div id="editModal" class="modal hidden">

        <div class="modal-content">

            <h2>✏️ Editar aporte</h2>

            <input
                type="number"
                id="editAmount">

            <textarea
                id="editComment"></textarea>

            <div class="modal-buttons">

                <button id="updateContributionBtn">
                    Guardar
                </button>

                <button id="cancelEditBtn">
                    Cancelar
                </button>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- SCRIPTS -->
    <!-- ========================= -->

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/personas.js"></script>
    <script src="js/aportes.js"></script>
    <script src="js/app.js"></script>
    <script>

if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register(
        './service-worker.js'
    );

}

</script>
<footer class="watermark">
    © By Regis_Salvador
</footer>
</body>

</html>
